    <style>
      html, body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(to bottom, #000814, #001d3d, #003566);
        background-attachment: fixed;
        color: #f8fafc;
        overscroll-behavior-y: none;
        margin: 0;
        padding: 0;
        width: 100%;
        overflow-x: hidden;
        position: relative;
      }
      * {
        box-sizing: border-box;
      }
      img, video, canvas, svg {
        max-width: 100%;
        height: auto;
      }
      #root {
        min-h-screen: 100vh;
      }
      .bg-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background: radial-gradient(circle at center, transparent 0%, rgba(0, 8, 20, 0.6) 100%);
      }
      @keyframes shimmer {
        0% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.05); }
        100% { opacity: 0.3; transform: scale(1); }
      }
      @keyframes distantStarMove {
        0% { transform: translateY(-10vh) translateX(-5vw); opacity: 0; }
        10% { opacity: 0.4; }
        90% { opacity: 0.4; }
        100% { transform: translateY(110vh) translateX(10vw); opacity: 0; }
      }
      @keyframes twinkle {
        0%, 100% { opacity: 0.2; transform: scale(0.7); }
        50% { opacity: 0.8; transform: scale(1.1); }
      }
      @keyframes shootingStar {
        0% { transform: translate(0, 0) rotate(var(--rotation)) scale(0); opacity: 0; }
        5% { opacity: 1; transform: translate(var(--move-x-start), var(--move-y-start)) rotate(var(--rotation)) scale(1.2); }
        15% { opacity: 1; }
        25% { transform: translate(var(--move-x-end), var(--move-y-end)) rotate(var(--rotation)) scale(1); opacity: 0; }
        100% { transform: translate(var(--move-x-end), var(--move-y-end)) rotate(var(--rotation)) scale(1); opacity: 0; }
      }
      .shooting-star {
        position: absolute;
        width: 120px;
        height: 2px;
        background: linear-gradient(to right, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.5), #fff);
        border-radius: 2px;
        opacity: 0;
        pointer-events: none;
        z-index: 1;
        --rotation: 0deg;
        --move-x-start: 0px;
        --move-y-start: 0px;
        --move-x-end: 0px;
        --move-y-end: 0px;
      }
      .shooting-star::after {
        content: '';
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 4px;
        height: 4px;
        background: #fff;
        border-radius: 50%;
        box-shadow: 0 0 10px 2px #E5B066, 0 0 20px 4px #fff;
      }
      @keyframes celestialMove {
        0% { transform: translate(-20vw, -20vh); opacity: 0; }
        5% { opacity: 0.8; }
        45% { opacity: 0.8; }
        50% { transform: translate(120vw, 120vh); opacity: 0; }
        100% { transform: translate(120vw, 120vh); opacity: 0; }
      }
      .celestial-body {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
        filter: blur(1px);
        opacity: 0;
      }
      .moon {
        width: 70px;
        height: 70px;
        background: radial-gradient(circle at 30% 30%, #ffffff, #cbd5e1);
        box-shadow: 0 0 50px 10px rgba(255, 255, 255, 0.3), inset -15px -15px 30px rgba(0,0,0,0.5);
      }
      .sun {
        width: 120px;
        height: 120px;
        background: radial-gradient(circle, #ffffff 0%, #fff7ed 30%, #fbbf24 70%, #f59e0b 100%);
        box-shadow: 0 0 150px 60px rgba(251, 191, 36, 0.6), 0 0 250px 100px rgba(180, 134, 70, 0.3);
      }
      .star-rain {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: #FFF;
        border-radius: 50%;
        opacity: 0;
        box-shadow: 0 0 5px 1px #E5B066, 0 0 10px #FFF;
      }
      .star-twinkle {
        animation: twinkle 2s ease-in-out infinite;
      }
      .bg-dynamic {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0.5;
        animation: shimmer 15s infinite ease-in-out;
      }
      h1, h2, h3, h4, h5, h6, button {
        font-family: 'Poppins', sans-serif;
      }
      @keyframes scanline {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100%); }
      }
      .animate-scanline {
        animation: scanline 4s linear infinite;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .custom-scrollbar-horizontal::-webkit-scrollbar {
        height: 4px;
      }
      .custom-scrollbar-horizontal::-webkit-scrollbar-track {
        background: rgba(180, 134, 70, 0.05);
      }
      .custom-scrollbar-horizontal::-webkit-scrollbar-thumb {
        background: rgba(180, 134, 70, 0.3);
        border-radius: 10px;
      }
      .custom-scrollbar-horizontal::-webkit-scrollbar-thumb:hover {
        background: rgba(180, 134, 70, 0.6);
      }
      .aura-24-hover {
        transition: all 0.3s ease;
        position: relative;
      }
      .aura-24-hover:hover {
        box-shadow: 0 0 20px 5px rgba(180, 134, 70, 0.4);
        transform: scale(1.02);
      }
      .aura-24-hover::after {
        content: 'Infini 24';
        position: absolute;
        top: -30px;
        left: 50%;
        transform: translateX(-50%) translateY(10px);
        background: #B48646;
        color: white;
        font-size: 8px;
        padding: 2px 8px;
        border-radius: 4px;
        opacity: 0;
        transition: all 0.3s ease;
        pointer-events: none;
        white-space: nowrap;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .aura-24-hover:hover::after {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .app-loader {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        background-color: #FDFCF8;
      }
    </style>
